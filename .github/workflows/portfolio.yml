name: Portfolio CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm install
      - run: npm ci
      - run: npm test

  sast:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - run: pip install semgrep
      - run: semgrep --config=p/typescript --config=p/react --error

  dependency-scan:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm audit --audit-level=high

  lints:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [tests, sast, dependency-scan, lints, build]
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g vercel@37.4.2
      - name: Deploy Staging
        id: deploy
        run: |
          OUTPUT=$(vercel --yes 2>&1)
          PREVIEW_URL=$(echo "$OUTPUT" | grep -o 'https://[^ ]*\.vercel\.app' | tail -1)
          echo "preview_url=${PREVIEW_URL}" >> $GITHUB_OUTPUT
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  
  security-headers:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: check security headers
        run: |
          URL="${{ needs.deploy-staging.outputs.preview_url }}"
          HEADERS=$(curl -sI $URL)
          echo "$HEADERS"

          check_headers() {
            if ! echo "$HEADERS" | grep -qi "$1"; then
              echo "✅ $1 present"
            else
              echo "❌ $1 missing"
            fi
          }

          check_headers "x-frame-options"
          check_headers "x-content-type-options"
          check_headers "strict-transport-security"
          check_headers "referrer-policy"
          check_headers "content-security-policy"

  dast:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Setup ZAP folder
        run: |
          mkdir -p /tmp/zap
          chmod 777 /tmp/zap

      - name: OWASP ZAP Scan
        run: |
          docker run --rm \
          --user root \
          -v /tmp/zap:/zap/wrk/:rw \
          ghcr.io/zaproxy/zaproxy:stable \
          zap-baseline.py \
          -t ${{ needs.deploy-staging.outputs.preview_url }} \
          -I

  deploy-production:
    runs-on: ubuntu-latest
    needs: dast
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g vercel
      - run: vercel --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
